<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continuous Horizontal Slideshow</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }
    .slideshow {
      width: 100%;
      height: 400px;
      overflow: hidden;
      position: relative;
      background: #000;
    }
    .slideshow img {
      height: 100%;
      width: auto;
      display: inline-block;
      animation: slide 20s linear infinite;
    }
    @keyframes slide {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>
  <div class="slideshow">
    <img src="product/mot/mot1.png" alt="Image 1">
    <img src="product/cin/cin1.png" alt="Image 2">
    <img src="product/cus/cus1.png" alt="Image 3">
    <img src="product/mot/mot2.png" alt="Image 4">
    <img src="product/car/car1.png" alt="Image 5">
    <img src="product/tam/tam1.png" alt="Image 6">
    <!-- Duplicate for continuous loop -->
    <img src="product/mot/mot1.png" alt="Image 1">
    <img src="product/cin/cin1.png" alt="Image 2">
    <img src="product/cus/cus1.png" alt="Image 3">
    <img src="product/mot/mot2.png" alt="Image 4">
    <img src="product/car/car1.png" alt="Image 5">
    <img src="product/tam/tam1.png" alt="Image 6">
  </div>

  <script>
    // Optional: Pause on hover
    const slideshow = document.querySelector('.slideshow');
    slideshow.addEventListener('mouseenter', () => {
      slideshow.style.animationPlayState = 'paused';
    });
    slideshow.addEventListener('mouseleave', () => {
      slideshow.style.animationPlayState = 'running';
    });
  </script>
</body>
</html>
